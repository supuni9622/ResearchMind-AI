name: summary
version: v2

title: Structured Research Summarization

description: >
  Structured summarization prompt optimized for
  research synthesis, context compression,
  and future runtime workflows.

tags:
  - summary
  - synthesis
  - compression
  - research
  - memory

owner: researchmind

experimental: false

recommended_use_cases:
  - research_summary
  - context_compression
  - session_summary
  - planner_summary
  - document_synthesis

preferred_providers:
  - claude
  - gemini
  - openai

routing:

  quality: high

  latency: low

  cost: low

  supports_streaming: false

  requires_structured_output: true

  requires_large_context: true

evaluation:

  enable_faithfulness: true

  enable_completeness: true

generation:

  temperature: 0.1

  max_tokens: 3000

  top_p: 0.9

context:

  compression_enabled: true

  reranking_required: false

artifacts:

  persist_prompt: false

  persist_response: true

  persist_evaluation: false

runtime:

  planner_enabled: false

  reviewer_enabled: false

future:

  supports_agents: true

  supports_memory: true

  supports_mcp: false

few_shot:

  enabled: true

  max_examples: 1

  selection: static
