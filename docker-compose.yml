services:

  postgres:
    image: postgres:17-alpine
    container_name: researchmind-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: researchmind
      POSTGRES_PASSWORD: researchmind
      POSTGRES_DB: researchmind

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:8-alpine
    container_name: researchmind-valkey

    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - valkey_data:/data

  qdrant:
    image: qdrant/qdrant:v1.18.0
    container_name: researchmind-qdrant

    restart: unless-stopped

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - qdrant_data:/qdrant/storage

  semantic-cache:
    image: redis/redis-stack-server:7.4.0-v6
    container_name: researchmind-semantic-cache

    #
    # Dedicated vector-search-capable Redis instance for the Runtime
    # Caching Platform's L2 Semantic Cache (langchain_redis.RedisSemanticCache
    # requires a RediSearch-enabled server for vector similarity queries,
    # which the plain `valkey` service above does not provide). Kept
    # separate from `valkey` so this platform's data and availability
    # don't interact with the rest of the app's Valkey usage.
    #

    restart: unless-stopped

    ports:
      - "6380:6379"

    volumes:
      - semantic_cache_data:/data

volumes:

  postgres_data:

  valkey_data:

  qdrant_data:

  semantic_cache_data: